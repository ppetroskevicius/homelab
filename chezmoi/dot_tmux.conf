# --- Prefix ---
unbind C-b
set -g prefix `
# pressing prefix key (`) twice switches to the last window
bind-key ` last-window
# for backtick - press `prefix + e`
bind-key e send-prefix

# --- Terminal & true-color rendering ---
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# --- Focus events ---
set -g focus-events on

# --- Clipboard ---
set -g set-clipboard external
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell "command -v pbcopy" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard 2>/dev/null || cat > /dev/null'"

# --- Mouse ---
set -g mouse on

# --- Window/pane numbering ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Automatic window naming ---
set -g automatic-rename on
set -g status-interval 300
set -g automatic-rename-format '#{?pane_in_mode,[tmux],#(git -C "#{pane_current_path}" branch --show-current 2>/dev/null | grep . || git -C "#{pane_current_path}" rev-parse --short HEAD 2>/dev/null || basename "#{pane_current_path}")}'

# --- Navigation ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Status bar ---
set -g status-position bottom
set -g status-style bg=colour234,fg=colour137,dim
set -g status-left '#[fg=colour255,bg=colour33,bold] #S #[default] '
set -g status-left-length 30
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M '
set -g status-right-length 50
set -g history-limit 50000

setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style fg=colour255,bg=colour1,bold

# --- Activity monitoring ---
setw -g monitor-activity on
set -g visual-activity off

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# --- Cheat sheet popup ---
unbind ?
bind ? display-popup -w 80% -h 70% -E "less ~/.config/tmux/cheatsheet.txt"

# --- Git worktree integration ---
bind g display-popup -w 80% -h 60% -E '\
  if ! git rev-parse --git-dir >/dev/null 2>&1; then \
    echo "Not a git repository"; read -n 1; exit 1; \
  fi; \
  if ! command -v fzf >/dev/null 2>&1; then \
    echo "fzf not installed"; read -n 1; exit 1; \
  fi; \
  selected=$(git worktree list | fzf --prompt="worktree> " --height=100% --reverse); \
  if [ -n "$selected" ]; then \
    dir=$(echo "$selected" | awk "{print \$1}"); \
    tmux send-keys "cd \"$dir\" && clear" Enter; \
  fi'

bind G display-popup -w 80% -h 40% -E '\
  if ! git rev-parse --git-dir >/dev/null 2>&1; then \
    echo "Not a git repository"; read -n 1; exit 1; \
  fi; \
  printf "Branch name: "; read branch; \
  if [ -z "$branch" ]; then exit 0; fi; \
  base=$(git rev-parse --show-toplevel); \
  wt_dir="${base}/.worktrees/${branch}"; \
  git worktree add "$wt_dir" -b "$branch" 2>&1; \
  if [ $? -eq 0 ]; then \
    tmux new-window -c "$wt_dir"; \
  else \
    echo ""; echo "Press any key..."; read -n 1; \
  fi'

# --- Plugin Manager (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- tmux-resurrect ---
set -g @resurrect-capture-pane-contents 'on'

# --- tmux-continuum ---
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
