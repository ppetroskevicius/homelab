# AeroSpace config — Sway-inspired tiling WM for macOS
# https://nikitabobko.github.io/AeroSpace/guide
#
# This is the base config. Monitor-specific workspace assignments
# are appended by the `aerospace-profile` script.

start-at-login = true
after-login-command = []
after-startup-command = ['exec-and-forget borders']

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focus-changed = ["move-mouse window-lazy-center"]
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]

# Layout settings
accordion-padding = 30
default-root-container-layout = "tiles"
default-root-container-orientation = "horizontal"

# Gaps
[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 4
outer.right = 4
outer.top = 4
outer.bottom = 4

# -----------------------------------------------------------
# Main mode keybindings
# -----------------------------------------------------------
[mode.main.binding]

# Navigation — vim-style hjkl (Sway: Mod+h/j/k/l)
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# Move windows — vim-style hjkl (Sway: Mod+Shift+h/j/k/l)
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# Fullscreen (Sway: Mod+f) — moved to Ctrl to free alt-f for Figma workspace
alt-ctrl-f = "fullscreen"

# Quick resize (no mode switch needed)
alt-shift-minus = "resize smart -50"
alt-shift-equal = "resize smart +50"

# Float toggle (Sway: Mod+Shift+space)
alt-shift-space = "layout floating tiling"

# Focus mode toggle (Sway: Mod+space)
alt-space = "focus-back-and-forth"

# Layout — join-with & accordion (Sway: Mod+b, Mod+v, Mod+e, Mod+w)
alt-b = "join-with left"
alt-v = "join-with down"
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"

# Workspaces 1-9
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# Move window to workspace
alt-shift-1 = "move-node-to-workspace 1"
alt-shift-2 = "move-node-to-workspace 2"
alt-shift-3 = "move-node-to-workspace 3"
alt-shift-4 = "move-node-to-workspace 4"
alt-shift-5 = "move-node-to-workspace 5"
alt-shift-6 = "move-node-to-workspace 6"
alt-shift-7 = "move-node-to-workspace 7"
alt-shift-8 = "move-node-to-workspace 8"
alt-shift-9 = "move-node-to-workspace 9"

# Multi-monitor
alt-tab = "workspace-back-and-forth"
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"
alt-shift-leftSquareBracket = "focus-monitor prev"
alt-shift-rightSquareBracket = "focus-monitor next"

# App launchers
alt-enter = "exec-and-forget env -u CLAUDECODE ~/.cargo/bin/alacritty"
alt-shift-q = "close"
alt-c = "exec-and-forget open -a 'Visual Studio Code'"

# Letter workspace navigation (letter = app initial)
alt-g = "workspace G"
alt-m = "workspace M"
alt-n = "workspace N"
alt-a = "workspace A"
alt-s = "workspace S"
alt-t = "workspace T"
alt-w = "workspace W"
alt-o = "workspace O"
alt-d = "workspace D"
alt-i = "workspace I"
alt-f = "workspace F"

# Move window to letter workspace
alt-shift-g = "move-node-to-workspace G"
alt-shift-m = "move-node-to-workspace M"
alt-shift-n = "move-node-to-workspace N"
alt-shift-a = "move-node-to-workspace A"
alt-shift-s = "move-node-to-workspace S"
alt-shift-t = "move-node-to-workspace T"
alt-shift-w = "move-node-to-workspace W"
alt-shift-o = "move-node-to-workspace O"
alt-shift-d = "move-node-to-workspace D"
alt-shift-i = "move-node-to-workspace I"
alt-shift-f = "move-node-to-workspace F"

# Reload config (Sway: Mod+Shift+c)
alt-shift-c = "reload-config"

# Enter resize mode (Sway: Mod+r)
alt-r = "mode resize"

# -----------------------------------------------------------
# Resize mode (Sway: mode "resize")
# -----------------------------------------------------------
[mode.resize.binding]
h = "resize width -50"
j = "resize height +50"
k = "resize height -50"
l = "resize width +50"
esc = "mode main"
enter = "mode main"

# -----------------------------------------------------------
# Window rules
# -----------------------------------------------------------

# Alacritty (source build, no app bundle) -> force tiling, terminal workspace
[[on-window-detected]]
if.app-name-regex-substring = "alacritty"
run = ["layout tiling", "move-node-to-workspace T"]

# Slack -> S
[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run = "move-node-to-workspace S"

# Notion -> N
[[on-window-detected]]
if.app-id = "notion.id"
run = "move-node-to-workspace N"

# Claude Desktop -> A (Anthropic)
[[on-window-detected]]
if.app-id = "com.anthropic.claudefordesktop"
run = "move-node-to-workspace A"

# VS Code / Cursor -> T (tiles with Alacritty)
[[on-window-detected]]
if.app-id = "com.todesktop.230313mzl4w4u92"
run = "move-node-to-workspace T"

# Google Chrome -> G (first window goes to Calendar workspace)
[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = "move-node-to-workspace G"

# Obsidian -> O
[[on-window-detected]]
if.app-id = "md.obsidian"
run = "move-node-to-workspace O"

# DataGrip -> D
[[on-window-detected]]
if.app-id = "com.jetbrains.datagrip"
run = "move-node-to-workspace D"

# IntelliJ -> I
[[on-window-detected]]
if.app-id = "com.jetbrains.intellij"
run = "move-node-to-workspace I"

# Spotify -> M (music)
[[on-window-detected]]
if.app-id = "com.spotify.client"
run = "move-node-to-workspace M"

# Figma -> F
[[on-window-detected]]
if.app-id = "com.figma.Desktop"
run = "move-node-to-workspace F"

# System Settings -> float
[[on-window-detected]]
if.app-id = "com.apple.systempreferences"
run = "layout floating"

# Cisco VPN -> float
[[on-window-detected]]
if.app-name-regex-substring = "Cisco"
run = "layout floating"

# Preview -> float
[[on-window-detected]]
if.app-id = "com.apple.Preview"
run = "layout floating"

# Finder -> float
[[on-window-detected]]
if.app-id = "com.apple.finder"
run = "layout floating"

# 1Password -> float
[[on-window-detected]]
if.app-id = "com.1password.1password"
run = "layout floating"

# Notes -> float
[[on-window-detected]]
if.app-id = "com.apple.Notes"
run = "layout floating"
