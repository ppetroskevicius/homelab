# AeroSpace config — Sway-inspired tiling WM for macOS
# https://nikitabobko.github.io/AeroSpace/guide
#
# This is the base config. Monitor-specific workspace assignments
# are appended by the `aerospace-profile` script.

start-at-login = true
after-login-command = []
after-startup-command = []

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focus-changed = ["move-mouse window-lazy-center"]
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]

# Layout settings
accordion-padding = 30
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"

# Gaps
[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 4
outer.right = 4
outer.top = 4
outer.bottom = 4

# -----------------------------------------------------------
# Main mode keybindings
# -----------------------------------------------------------
[mode.main.binding]

# Navigation — vim-style hjkl (Sway: Mod+h/j/k/l)
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# Move windows — vim-style hjkl (Sway: Mod+Shift+h/j/k/l)
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# Fullscreen (Sway: Mod+f)
alt-f = "fullscreen"

# Float toggle (Sway: Mod+Shift+space)
alt-shift-space = "layout floating tiling"

# Focus mode toggle (Sway: Mod+space)
alt-space = "focus-back-and-forth"

# Layout — join-with & accordion (Sway: Mod+b, Mod+v, Mod+e, Mod+w)
alt-b = "join-with left"
alt-v = "join-with down"
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"

# Workspaces 1-9
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# Move window to workspace
alt-shift-1 = "move-node-to-workspace 1"
alt-shift-2 = "move-node-to-workspace 2"
alt-shift-3 = "move-node-to-workspace 3"
alt-shift-4 = "move-node-to-workspace 4"
alt-shift-5 = "move-node-to-workspace 5"
alt-shift-6 = "move-node-to-workspace 6"
alt-shift-7 = "move-node-to-workspace 7"
alt-shift-8 = "move-node-to-workspace 8"
alt-shift-9 = "move-node-to-workspace 9"

# Multi-monitor
alt-tab = "workspace-back-and-forth"
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"
alt-shift-leftSquareBracket = "focus-monitor prev"
alt-shift-rightSquareBracket = "focus-monitor next"

# App launchers
alt-enter = "exec-and-forget env -u CLAUDECODE ~/.cargo/bin/alacritty"
alt-shift-q = "close"
alt-g = "exec-and-forget open -a 'Google Chrome'"
alt-c = "exec-and-forget open -a 'Visual Studio Code'"
alt-s = "exec-and-forget open -a Slack"
alt-a = "exec-and-forget open -a 'Claude'"
alt-n = "exec-and-forget open -a Notion"

# Reload config (Sway: Mod+Shift+c)
alt-shift-c = "reload-config"

# Enter resize mode (Sway: Mod+r)
alt-r = "mode resize"

# -----------------------------------------------------------
# Resize mode (Sway: mode "resize")
# -----------------------------------------------------------
[mode.resize.binding]
h = "resize width -50"
j = "resize height +50"
k = "resize height -50"
l = "resize width +50"
esc = "mode main"
enter = "mode main"

# -----------------------------------------------------------
# Window rules
# -----------------------------------------------------------

# Alacritty (source build, no app bundle) -> force tiling
[[on-window-detected]]
if.app-name-regex-substring = "alacritty"
run = ["layout tiling", "move-node-to-workspace 5"]

# Slack -> workspace 1
[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run = "move-node-to-workspace 1"

# Notion -> workspace 2
[[on-window-detected]]
if.app-id = "notion.id"
run = "move-node-to-workspace 2"

# Claude Desktop -> workspace 3
[[on-window-detected]]
if.app-id = "com.anthropic.claudefordesktop"
run = "move-node-to-workspace 3"

# VS Code / Cursor -> workspace 4
[[on-window-detected]]
if.app-id = "com.todesktop.230313mzl4w4u92"
run = "move-node-to-workspace 4"

# Google Chrome -> workspace 5
[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = "move-node-to-workspace 5"

# System Settings -> float
[[on-window-detected]]
if.app-id = "com.apple.systempreferences"
run = "layout floating"

# Cisco VPN -> float
[[on-window-detected]]
if.app-name-regex-substring = "Cisco"
run = "layout floating"

# Preview -> float
[[on-window-detected]]
if.app-id = "com.apple.Preview"
run = "layout floating"

# Finder -> float
[[on-window-detected]]
if.app-id = "com.apple.finder"
run = "layout floating"

# 1Password -> float
[[on-window-detected]]
if.app-id = "com.1password.1password"
run = "layout floating"
