# PipeWire-Pulse compatibility settings
# Ensures applications using PulseAudio API work correctly

pulse.properties = {
    # Enable automatic device switching
    server.address = [ "unix:native" ]
}

pulse.rules = [
    {
        # Match all PulseAudio clients
        matches = [ { application.process.binary = "~.*" } ]
        actions = {
            update-props = {
                # Better quality resampling for PulseAudio clients
                resample.quality = 10
            }
        }
    }
]
