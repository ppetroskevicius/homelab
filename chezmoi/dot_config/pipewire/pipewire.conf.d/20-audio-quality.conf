# PipeWire audio quality settings
# Migrated from PulseAudio daemon.conf

context.properties = {
    # Avoid unnecessary resampling when possible
    default.clock.rate = 48000
}

context.modules = [
    # Load real-time scheduling module for better audio performance
    { name = libpipewire-module-rt
        args = {
            nice.level = -11
            rt.prio = 88
        }
        flags = [ ifexists nofail ]
    }
]

# Stream properties for quality
stream.properties = {
    resample.quality = 10
    resample.disable = false
    channelmix.normalize = false
    channelmix.mix-lfe = false
}
