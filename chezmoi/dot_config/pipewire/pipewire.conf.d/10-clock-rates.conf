# PipeWire clock and sample rate configuration
# Migrated from PulseAudio daemon.conf

context.properties = {
    # Default sample rate (matches your Sony WH-1000XM5)
    default.clock.rate = 48000

    # Allowed rates for automatic switching
    default.clock.allowed-rates = [ 44100 48000 ]

    # Quantum (buffer size) - lower = less latency, higher CPU
    # 1024 at 48000Hz = ~21ms latency (good for Bluetooth)
    default.clock.quantum = 1024
    default.clock.min-quantum = 32
    default.clock.max-quantum = 2048
}
