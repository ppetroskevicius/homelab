---
# 1Password CLI - desktop machines only (dt-* hostnames)
# Non-desktop machines use SSH Agent Forwarding from desktop

# --- Debian/Ubuntu: 1Password CLI via apt ---
- name: Download 1Password GPG key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /tmp/1password.asc
    mode: '0644'
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - is_desktop | default(false)

- name: Dearmor 1Password GPG key
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/1password.asc > /usr/share/keyrings/1password-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/1password-archive-keyring.gpg
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - is_desktop | default(false)

- name: Add 1Password repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main"
    state: present
    filename: 1password
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - is_desktop | default(false)

- name: Install 1Password CLI (Debian/Ubuntu)
  ansible.builtin.apt:
    name: 1password-cli
    state: present
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - is_desktop | default(false)

# --- macOS: 1Password CLI via Homebrew ---
- name: Install 1Password CLI (macOS)
  community.general.homebrew_cask:
    name: 1password-cli
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - is_desktop | default(false)

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_gid'] }}"

# Note: We use 1Password desktop integration (biometric) instead of OP_SERVICE_ACCOUNT_TOKEN
# See docs/SECRETS.md for the secrets management strategy
