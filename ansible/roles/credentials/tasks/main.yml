---
# 1Password CLI - desktop machines only (dt-* hostnames)
# Non-desktop machines use SSH Agent Forwarding from desktop

- name: Set credentials target user fact
  ansible.builtin.set_fact:
    credentials_target_user: "{{ ansible_facts.env.SUDO_USER | default(ansible_facts['user_id']) }}"

- name: Set credentials target home fact
  ansible.builtin.set_fact:
    credentials_user_home: >-
      {{ '/Users/' + credentials_target_user
      if ansible_facts['os_family'] == 'Darwin'
      else '/home/' + credentials_target_user }}

- name: Set credentials target group fact
  ansible.builtin.set_fact:
    credentials_target_group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else credentials_target_user }}"

# --- Debian/Ubuntu: 1Password CLI via apt ---
- name: Add 1Password repository
  ansible.builtin.deb822_repository:
    name: 1password
    types: deb
    uris: https://downloads.1password.com/linux/debian/amd64
    suites: stable
    components:
      - main
    architectures:
      - amd64
    signed_by: https://downloads.1password.com/linux/keys/1password.asc
    state: present
    install_python_debian: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - is_desktop | default(false)

- name: Install 1Password CLI (Debian/Ubuntu)
  ansible.builtin.apt:
    name: 1password-cli
    state: present
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - is_desktop | default(false)

# --- macOS: 1Password CLI via Homebrew ---
- name: Install 1Password CLI (macOS)
  community.general.homebrew_cask:
    name: 1password-cli
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - is_desktop | default(false)

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ credentials_user_home }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ credentials_target_user }}"
    group: "{{ credentials_target_group }}"
  become: "{{ ansible_facts['os_family'] == 'Debian' }}"

# Note: We use 1Password desktop integration (biometric) instead of OP_SERVICE_ACCOUNT_TOKEN
# See docs/SECRETS.md for the secrets management strategy
