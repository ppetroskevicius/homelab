---
# Install Go programming language

- name: Install Go (Debian/Ubuntu)
  ansible.builtin.apt:
    name: golang-go
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Go (macOS)
  community.general.homebrew:
    name: go
    state: present
  when: ansible_facts['os_family'] == "Darwin"

- name: Create Go workspace directory
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/go"
    state: directory
    mode: '0755'

- name: Install shfmt via Go (Debian/Ubuntu)
  ansible.builtin.shell: |
    export PATH="/usr/lib/go/bin:{{ ansible_facts.env.HOME }}/go/bin:$PATH"
    export GOPATH="{{ ansible_facts.env.HOME }}/go"
    go install mvdan.cc/sh/v3/cmd/shfmt@latest
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/go/bin/shfmt"
  when: ansible_facts['os_family'] == "Debian"

- name: Install golangci-lint (macOS)
  community.general.homebrew:
    name: golangci-lint
    state: present
  when: ansible_facts['os_family'] == "Darwin"

- name: Install golangci-lint via Go (Debian/Ubuntu)
  ansible.builtin.shell: |
    export PATH="/usr/lib/go/bin:{{ ansible_facts.env.HOME }}/go/bin:$PATH"
    export GOPATH="{{ ansible_facts.env.HOME }}/go"
    go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/go/bin/golangci-lint"
  when: ansible_facts['os_family'] == "Debian"
