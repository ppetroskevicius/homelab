---
# Install Java Development Kit
# Skipped when mise manages Java (mise_java_enabled: true)

- name: Install OpenJDK (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ java_package_debian }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - not (mise_java_enabled | default(false))

- name: Install OpenJDK (macOS)
  community.general.homebrew:
    name: "{{ java_package_darwin }}"
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (mise_java_enabled | default(false))

- name: Get Homebrew prefix for OpenJDK symlink
  ansible.builtin.command: brew --prefix
  register: homebrew_prefix
  changed_when: false
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (is_work_mac | default(false))
    - not (mise_java_enabled | default(false))

- name: Symlink OpenJDK for macOS system Java wrappers
  ansible.builtin.file:
    src: "{{ homebrew_prefix.stdout }}/opt/openjdk/libexec/openjdk.jdk"
    dest: /Library/Java/JavaVirtualMachines/openjdk.jdk
    state: link
    force: true
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (is_work_mac | default(false))
    - not (mise_java_enabled | default(false))
  become: true
