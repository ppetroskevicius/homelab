---
# Default variables for dev_languages role

# Rust configuration
rust_toolchain: stable

# Python tools to install via uv
uv_tools:
  - ruff
  - mypy
  - pyright
  - pylint
  - pytest
  - pre-commit

# Go version (use system package)
go_version: "latest"

# Java package (used when mise_java_enabled is false)
java_package_debian: "default-jdk"
java_package_darwin: "openjdk"

# mise binary path (cross-platform)
mise_bin_path: >-
  {{ '/opt/homebrew/bin/mise' if ansible_facts['os_family'] == 'Darwin'
  else ansible_facts.env.HOME + '/.local/bin/mise' }}

# Global tool versions managed by mise
mise_nodejs_default: "22.12.0"
mise_java_default: "temurin-17.0.13+11"
mise_java_enabled: true
