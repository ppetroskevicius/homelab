---
# Reusable "fetch an official install script and run it" flow.
#
# Included with a loop over desktop_script_installers (see desktop_apps.yml).
# Each item supplies:
#   name    - identifies the task output and the cached script filename
#   url     - install script to fetch
#   creates - path that proves the install already happened; guards both the
#             download and the run, so a converged host does no network I/O
# Optional:
#   become  - run the script as root (default false)
#   shell   - invoke via /bin/bash rather than executing directly (default false)
#   args    - extra arguments appended to the invocation (default none)
#
# Scripts land in a 0700 per-user cache dir rather than /tmp: the old fixed
# /tmp/<name>-install.sh paths were predictable names in a world-writable
# sticky directory, where another local account holding the path would fail
# the download outright.

- name: "Check whether already installed: {{ installer.name }}"
  ansible.builtin.stat:
    path: "{{ installer.creates }}"
  register: desktop_installer_check

- name: "Download install script: {{ installer.name }}"
  ansible.builtin.get_url:
    url: "{{ installer.url }}"
    dest: "{{ desktop_installer_cache_dir }}/{{ installer.name }}-install.sh"
    mode: '0755'
  when: not desktop_installer_check.stat.exists

- name: "Install {{ installer.name }}"
  ansible.builtin.command: >-
    {{ '/bin/bash ' if installer.shell | default(false) else '' }}{{
    desktop_installer_cache_dir }}/{{ installer.name }}-install.sh {{
    installer.args | default('') }}
  args:
    creates: "{{ installer.creates }}"
  become: "{{ installer.become | default(false) }}"
  register: desktop_installer_run
  changed_when: desktop_installer_run.rc == 0
  # An upstream host being unreachable shouldn't abort the rest of the play.
  failed_when: false
  when: not desktop_installer_check.stat.exists

- name: "Warn on failed install: {{ installer.name }}"
  ansible.builtin.debug:
    msg: >-
      {{ installer.name }} install failed (rc={{ desktop_installer_run.rc }}):
      {{ desktop_installer_run.stderr | default('') }}
  when:
    - desktop_installer_run.rc is defined
    - desktop_installer_run.rc != 0
