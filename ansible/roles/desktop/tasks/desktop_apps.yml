---
# Install desktop applications (browsers, editors, communication tools)

# Starship prompt (cross-platform)
- name: Check if starship is installed
  ansible.builtin.command: which starship
  register: starship_check
  changed_when: false
  failed_when: false

- name: Download Starship install script (Linux)
  ansible.builtin.get_url:
    url: https://starship.rs/install.sh
    dest: /tmp/starship-install.sh
    mode: '0755'
  when:
    - starship_check.rc != 0
    - ansible_facts['os_family'] == "Debian"

- name: Install Starship prompt (Linux)
  ansible.builtin.command: /tmp/starship-install.sh -y
  args:
    creates: /usr/local/bin/starship
  become: true
  when:
    - starship_check.rc != 0
    - ansible_facts['os_family'] == "Debian"

- name: Install Starship prompt (macOS)
  community.general.homebrew:
    name: starship
    state: present
  when:
    - starship_check.rc != 0
    - ansible_facts['os_family'] == "Darwin"

# 1Password GUI
- name: Check if 1Password is installed (Linux)
  ansible.builtin.command: which 1password
  register: onepassword_check
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Install 1Password (Linux)
  ansible.builtin.apt:
    name: 1password
    state: present
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - onepassword_check.rc != 0

- name: Install 1Password (macOS)
  community.general.homebrew_cask:
    name: 1password
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (is_work_mac | default(false))

# Google Chrome
- name: Check if Chrome is installed (Linux)
  ansible.builtin.command: which google-chrome
  register: chrome_check
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Download Google Chrome (Linux)
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    dest: /tmp/google-chrome.deb
    mode: '0644'
  when:
    - ansible_facts['os_family'] == "Debian"
    - chrome_check.rc != 0

- name: Install Google Chrome (Linux)
  ansible.builtin.apt:
    deb: /tmp/google-chrome.deb
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - chrome_check.rc != 0

- name: Install Google Chrome (macOS)
  community.general.homebrew_cask:
    name: google-chrome
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (is_work_mac | default(false))

# Firefox
- name: Install Firefox (Linux)
  ansible.builtin.apt:
    name: firefox
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Firefox (macOS)
  community.general.homebrew_cask:
    name: firefox
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Arc browser (macOS only)
- name: Check if Arc browser is installed (macOS)
  ansible.builtin.stat:
    path: /Applications/Arc.app
  register: arc_check
  when: ansible_facts['os_family'] == "Darwin"

- name: Install Arc browser (macOS)
  community.general.homebrew_cask:
    name: arc
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (arc_check.stat.exists | default(false))

# Cursor IDE
- name: Check if Cursor is installed (Linux)
  ansible.builtin.command: which cursor
  register: cursor_check
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Download Cursor install script (Linux)
  ansible.builtin.get_url:
    url: https://cursor.com/install
    dest: /tmp/cursor-install.sh
    mode: '0755'
  when:
    - ansible_facts['os_family'] == "Debian"
    - cursor_check.rc != 0

- name: Install Cursor via official install script (Linux)
  ansible.builtin.command: /bin/bash /tmp/cursor-install.sh
  args:
    creates: /usr/bin/cursor
  register: cursor_install
  changed_when: cursor_install.rc == 0
  failed_when: false
  when:
    - ansible_facts['os_family'] == "Debian"
    - cursor_check.rc != 0

- name: Install Cursor (macOS)
  community.general.homebrew_cask:
    name: cursor
    state: present
  when: ansible_facts['os_family'] == "Darwin"

- name: Install VS Code (macOS)
  community.general.homebrew_cask:
    name: visual-studio-code
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Claude Code (macOS via Homebrew cask, Linux via pnpm)
- name: Install Claude Code (macOS)
  community.general.homebrew_cask:
    name: claude-code
    state: present
  when: ansible_facts['os_family'] == "Darwin"

- name: Check if Claude Code is installed via pnpm (Linux)
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/share/pnpm/claude"
  register: claude_code_check
  when: ansible_facts['os_family'] == "Debian"

- name: Install Claude Code via pnpm (Linux)
  ansible.builtin.shell: |
    export NVM_DIR="{{ ansible_facts.env.HOME }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    export PNPM_HOME="{{ ansible_facts.env.HOME }}/.local/share/pnpm"
    export PATH="$PNPM_HOME:$PATH"
    pnpm add -g @anthropic-ai/claude-code
  args:
    executable: /bin/bash
  register: claude_code_install
  changed_when: claude_code_install.rc == 0
  when:
    - ansible_facts['os_family'] == "Debian"
    - not claude_code_check.stat.exists

# Claude Desktop app (macOS only)
- name: Install Claude Desktop (macOS)
  community.general.homebrew_cask:
    name: claude
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Codex CLI (macOS only)
- name: Install Codex CLI (macOS)
  community.general.homebrew_cask:
    name: codex
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# herdr — terminal multiplexer for AI coding agents (Claude Code, Codex).
# Desktop-only: tmux remains the multiplexer on bm-*/vm-* hosts.
- name: Install herdr (macOS)
  community.general.homebrew:
    name: herdr
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# install.sh drops the binary in ~/.local/bin, which is only on PATH via
# common.sh — not sourced by Ansible's non-login shell, so `which` would
# always miss it and this block would never converge. Stat the path instead.
- name: Check if herdr is installed (Linux)
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/bin/herdr"
  register: herdr_check
  when: ansible_facts['os_family'] == "Debian"

- name: Download herdr install script (Linux)
  ansible.builtin.get_url:
    url: https://herdr.dev/install.sh
    dest: /tmp/herdr-install.sh
    mode: '0755'
  when:
    - ansible_facts['os_family'] == "Debian"
    - not herdr_check.stat.exists

- name: Install herdr (Linux)
  ansible.builtin.command: /tmp/herdr-install.sh
  args:
    creates: "{{ ansible_facts.env.HOME }}/.local/bin/herdr"
  register: herdr_install
  # herdr.dev being unreachable shouldn't abort the rest of the desktop play.
  failed_when: false
  when:
    - ansible_facts['os_family'] == "Debian"
    - not herdr_check.stat.exists

- name: Warn if herdr install failed (Linux)
  ansible.builtin.debug:
    msg: "herdr install failed (rc={{ herdr_install.rc }}): {{ herdr_install.stderr | default('') }}"
  when:
    - herdr_install is defined
    - herdr_install.rc is defined
    - herdr_install.rc != 0

# Discord
- name: Check if Discord is installed (Linux)
  ansible.builtin.command: which discord
  register: discord_check
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Download Discord (Linux)
  ansible.builtin.get_url:
    url: https://discord.com/api/download?platform=linux&format=deb
    dest: /tmp/discord.deb
    mode: '0644'
  when:
    - ansible_facts['os_family'] == "Debian"
    - discord_check.rc != 0

- name: Install Discord (Linux)
  ansible.builtin.apt:
    deb: /tmp/discord.deb
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - discord_check.rc != 0

- name: Install Discord (macOS)
  community.general.homebrew_cask:
    name: discord
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (is_work_mac | default(false))

# Spotify
- name: Add Spotify apt repository (Linux)
  ansible.builtin.deb822_repository:
    name: spotify
    types: deb
    uris: http://repository.spotify.com
    suites: stable
    components:
      - non-free
    signed_by: https://download.spotify.com/debian/pubkey_C85668DF69375001.gpg
    state: present
    install_python_debian: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Spotify (Linux)
  ansible.builtin.apt:
    name: spotify-client
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Spotify (macOS)
  community.general.homebrew_cask:
    name: spotify
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (is_work_mac | default(false))

# Zotero reference manager
- name: Download Zotero repository install script (Linux)
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/retorquere/zotero-deb/master/install.sh
    dest: /tmp/zotero-deb-install.sh
    mode: '0755'
  when: ansible_facts['os_family'] == "Debian"

- name: Add Zotero repository (Linux)
  ansible.builtin.command: /bin/bash /tmp/zotero-deb-install.sh
  args:
    creates: /etc/apt/sources.list.d/zotero.list
  become: true
  register: zotero_repo_install
  changed_when: zotero_repo_install.rc == 0
  failed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Install Zotero (Linux)
  ansible.builtin.apt:
    name: zotero
    state: present
    update_cache: true
  become: true
  register: zotero_install
  failed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Install Zotero (macOS)
  community.general.homebrew_cask:
    name: zotero
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not (is_work_mac | default(false))

# Remmina remote desktop (Linux only)
- name: Install Remmina (Linux)
  ansible.builtin.apt:
    name: remmina
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

# AeroSpace tiling window manager (macOS only)
- name: Tap nikitabobko/tap (macOS)
  community.general.homebrew_tap:
    name: nikitabobko/tap
    state: present
  when: ansible_facts['os_family'] == "Darwin"

- name: Install AeroSpace (macOS)
  community.general.homebrew_cask:
    name: aerospace
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Homebrew's tap-trust gate blocks future brew operations on third-party
# formulae/casks until explicitly trusted (community.general has no module for
# this yet, so `brew trust` is idempotent on its own — it reports "Already
# trusted" and exits 0 on repeat runs).
- name: Trust AeroSpace cask (macOS)
  ansible.builtin.command: brew trust --cask nikitabobko/tap/aerospace
  register: trust_aerospace
  changed_when: "'Already trusted' not in trust_aerospace.stdout"
  when: ansible_facts['os_family'] == "Darwin"

# Borders — focused window highlight for AeroSpace (macOS only)
- name: Tap FelixKratz formulae (macOS)
  community.general.homebrew_tap:
    name: FelixKratz/formulae
    state: present
  when: ansible_facts['os_family'] == "Darwin"

- name: Install borders (macOS)
  community.general.homebrew:
    name: borders
    state: present
  when: ansible_facts['os_family'] == "Darwin"

- name: Trust borders formula (macOS)
  ansible.builtin.command: brew trust --formula felixkratz/formulae/borders
  register: trust_borders
  changed_when: "'Already trusted' not in trust_borders.stdout"
  when: ansible_facts['os_family'] == "Darwin"

# Rancher Desktop (macOS only)
- name: Install Rancher Desktop (macOS)
  community.general.homebrew_cask:
    name: rancher
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# IntelliJ IDEA (macOS only)
- name: Install IntelliJ IDEA Ultimate (macOS)
  community.general.homebrew_cask:
    name: intellij-idea
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Alacritty via Homebrew cask (macOS only - Linux builds from source via cargo)
- name: Install Alacritty (macOS)
  community.general.homebrew_cask:
    name: alacritty
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Figma (macOS only)
- name: Install Figma (macOS)
  community.general.homebrew_cask:
    name: figma
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Slack (macOS only)
- name: Install Slack (macOS)
  community.general.homebrew_cask:
    name: slack
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# Marp CLI — Markdown presentation to PDF/HTML converter
- name: Check if marp is installed
  ansible.builtin.command: which marp
  register: marp_check
  changed_when: false
  failed_when: false

- name: Install Marp CLI (macOS)
  community.general.homebrew:
    name: marp-cli
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - marp_check.rc != 0

- name: Install Marp CLI via pnpm (Linux)
  ansible.builtin.shell: |
    export PNPM_HOME="{{ ansible_facts.env.HOME }}/.local/share/pnpm"
    export PATH="$PNPM_HOME:$PATH"
    pnpm add -g @marp-team/marp-cli
  args:
    executable: /bin/bash
  register: marp_install
  changed_when: marp_install.rc == 0
  when:
    - ansible_facts['os_family'] == "Debian"
    - marp_check.rc != 0
