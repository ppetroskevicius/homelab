---
# K3s installation tasks
# Based on legacy_scripts/08_containers.sh::install_k3s()

- name: Check if K3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download K3s installation script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_binary.stat.exists

- name: Install K3s server (control plane)
  ansible.builtin.shell: |
    INSTALL_K3S_EXEC="server" K3S_KUBECONFIG_MODE="644" /tmp/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  become: true
  when:
    - not k3s_binary.stat.exists
    - inventory_hostname == groups['vm_k8s_node'][0]  # First node is control plane

- name: Wait for K3s server to be ready
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 120
  become: true
  when: inventory_hostname == groups['vm_k8s_node'][0]

- name: Get K3s server token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token
  become: true
  when: inventory_hostname == groups['vm_k8s_node'][0]
  delegate_to: "{{ groups['vm_k8s_node'][0] }}"

- name: Set K3s token fact
  ansible.builtin.set_fact:
    k3s_server_token: "{{ hostvars[groups['vm_k8s_node'][0]]['k3s_token']['content'] | b64decode | trim }}"
  when: "'vm_k8s_node' in group_names"

- name: Install K3s agent (worker nodes)
  ansible.builtin.shell: |
    K3S_URL="https://{{ hostvars[groups['vm_k8s_node'][0]]['ansible_host'] }}:6443" \
    K3S_TOKEN="{{ k3s_server_token }}" \
    /tmp/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  become: true
  when:
    - not k3s_binary.stat.exists
    - inventory_hostname != groups['vm_k8s_node'][0]  # Not the control plane

- name: Enable and start K3s service
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
  become: true
  when: inventory_hostname == groups['vm_k8s_node'][0]

- name: Enable and start K3s agent service
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
  become: true
  when: inventory_hostname != groups['vm_k8s_node'][0]

- name: Create .kube directory for user
  ansible.builtin.file:
    path: "/home/{{ ansible_facts['user_id'] }}/.kube"
    state: directory
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0755"
  when: inventory_hostname == groups['vm_k8s_node'][0]

- name: Copy kubeconfig for user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_facts['user_id'] }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"
  become: true
  when: inventory_hostname == groups['vm_k8s_node'][0]

- name: Update kubeconfig server address
  ansible.builtin.replace:
    path: "/home/{{ ansible_facts['user_id'] }}/.kube/config"
    regexp: "127.0.0.1"
    replace: "{{ ansible_host }}"
  when: inventory_hostname == groups['vm_k8s_node'][0]

- name: Clean up installation script
  ansible.builtin.file:
    path: /tmp/k3s-install.sh
    state: absent
