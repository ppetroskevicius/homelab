---
# Default variables for cloud_tools role

# AWS CLI version
aws_cli_version: "2"

# Terraform version (managed via apt repo)
terraform_version: "latest"

# Playwright Linux dependencies
playwright_deps_debian:
  - libwoff1
  - libevent-2.1-7t64
  - libopus0
  - libgstreamer-plugins-base1.0-0
  - libgstreamer1.0-0
  - libharfbuzz-icu0
  - libhyphen0
  - libmanette-0.2-0
  - libflite1
  - libgles2
