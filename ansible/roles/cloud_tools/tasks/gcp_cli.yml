---
# Install Google Cloud CLI

- name: Check if gcloud is already installed
  ansible.builtin.command: which gcloud
  register: gcloud_check
  changed_when: false
  failed_when: false

# Linux installation via apt repository
- name: Install apt-transport-https and curl (Linux)
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Add Google Cloud apt repository (Linux)
  ansible.builtin.deb822_repository:
    name: google-cloud-sdk
    types: deb
    uris: https://packages.cloud.google.com/apt
    suites: cloud-sdk
    components:
      - main
    signed_by: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    state: present
    install_python_debian: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - gcloud_check.rc != 0

- name: Install Google Cloud CLI (Linux)
  ansible.builtin.apt:
    name: google-cloud-cli
    state: present
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - gcloud_check.rc != 0

# macOS installation via Homebrew
- name: Install Google Cloud SDK (macOS)
  community.general.homebrew_cask:
    name: google-cloud-sdk
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - gcloud_check.rc != 0
