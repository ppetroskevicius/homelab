---
# Install Google Cloud CLI

- name: Check if gcloud is already installed
  ansible.builtin.command: which gcloud
  register: cloud_tools_gcloud_check
  changed_when: false
  failed_when: false

# Linux installation via apt repository
- name: Install apt-transport-https and curl (Linux)
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Add Google Cloud apt repository (Linux)
  ansible.builtin.deb822_repository:
    name: google-cloud-sdk
    types: deb
    uris: https://packages.cloud.google.com/apt
    suites: cloud-sdk
    components:
      - main
    signed_by: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    state: present
    install_python_debian: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - cloud_tools_gcloud_check.rc != 0

- name: Install Google Cloud CLI (Linux)
  ansible.builtin.apt:
    name: google-cloud-cli
    state: present
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - cloud_tools_gcloud_check.rc != 0

# macOS installation via Homebrew
# The cask was renamed google-cloud-sdk -> gcloud-cli; it depends on python@3.14.
# CLOUDSDK_PYTHON (pinning gcloud to python@3.14) is intentionally NOT set here:
# macOS hosts are desktops whose shell env is owned by chezmoi (dot_zshrc.tmpl),
# and Linux uses the apt google-cloud-cli package with a modern system Python.
- name: Install Google Cloud CLI (macOS)
  community.general.homebrew_cask:
    name: gcloud-cli
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - cloud_tools_gcloud_check.rc != 0
