---
# Install GitHub CLI (gh)

- name: Check if gh is already installed
  ansible.builtin.command: which gh
  register: gh_check
  changed_when: false
  failed_when: false

# Linux installation
- name: Add GitHub CLI apt repository (Linux)
  ansible.builtin.deb822_repository:
    name: github-cli
    types: deb
    uris: https://cli.github.com/packages
    suites: stable
    components:
      - main
    architectures:
      - "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"
    signed_by: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    state: present
    install_python_debian: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - gh_check.rc != 0

- name: Install GitHub CLI (Linux)
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - gh_check.rc != 0

# macOS installation
- name: Install GitHub CLI (macOS)
  community.general.homebrew:
    name: gh
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - gh_check.rc != 0
