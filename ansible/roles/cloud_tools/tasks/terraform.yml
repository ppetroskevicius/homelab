---
# Install Terraform via HashiCorp repository

- name: Check if terraform is already installed
  ansible.builtin.command: which terraform
  register: cloud_tools_terraform_check
  changed_when: false
  failed_when: false

# Linux installation via HashiCorp apt repository
- name: Install required packages for HashiCorp repo (Linux)
  ansible.builtin.apt:
    name:
      - gnupg
      - software-properties-common
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Add HashiCorp apt repository (Linux)
  ansible.builtin.deb822_repository:
    name: hashicorp
    types: deb
    uris: https://apt.releases.hashicorp.com
    suites: "{{ ansible_facts['distribution_release'] }}"
    components:
      - main
    signed_by: https://apt.releases.hashicorp.com/gpg
    state: present
    install_python_debian: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - cloud_tools_terraform_check.rc != 0

- name: Install Terraform (Linux)
  ansible.builtin.apt:
    name: terraform
    state: present
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - cloud_tools_terraform_check.rc != 0

# macOS installation via Homebrew
- name: Add HashiCorp tap (macOS)
  community.general.homebrew_tap:
    name: hashicorp/tap
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - cloud_tools_terraform_check.rc != 0

- name: Install Terraform (macOS)
  community.general.homebrew:
    name: hashicorp/tap/terraform
    state: present
  when:
    - ansible_facts['os_family'] == "Darwin"
    - cloud_tools_terraform_check.rc != 0
