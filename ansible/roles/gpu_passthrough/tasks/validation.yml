---
# =============================================================================
# Pre-flight Validation for GPU Passthrough
# =============================================================================

- name: Validate CPU vendor is specified
  ansible.builtin.assert:
    that:
      - gpu_passthrough.cpu_vendor in ['intel', 'amd']
    fail_msg: "gpu_passthrough.cpu_vendor must be 'intel' or 'amd', got: {{ gpu_passthrough.cpu_vendor | default('undefined') }}"
    success_msg: "CPU vendor: {{ gpu_passthrough.cpu_vendor }}"

- name: Validate GPU devices are specified
  ansible.builtin.assert:
    that:
      - gpu_passthrough_devices | length > 0
    fail_msg: "gpu_passthrough_devices must contain at least one device"
    success_msg: "GPU devices to passthrough: {{ gpu_passthrough_devices | map(attribute='name') | list }}"

- name: Validate each GPU device has required fields
  ansible.builtin.assert:
    that:
      - item.pci_slot is defined
      - item.vendor_id is defined
      - item.device_id is defined
    fail_msg: "GPU device {{ item.name | default('unnamed') }} missing required fields (pci_slot, vendor_id, device_id)"
    success_msg: "GPU device {{ item.name }} validated: {{ item.pci_slot }}"
  loop: "{{ gpu_passthrough_devices }}"
  loop_control:
    label: "{{ item.name | default(item.pci_slot) }}"

- name: Check if IOMMU is enabled in kernel
  ansible.builtin.shell:
    cmd: dmesg | grep -i -E 'DMAR|IOMMU|AMD-Vi' | head -5
  register: iommu_dmesg
  changed_when: false
  failed_when: false

- name: Display IOMMU status from dmesg
  ansible.builtin.debug:
    msg: "{{ iommu_dmesg.stdout_lines }}"
  when: iommu_dmesg.stdout_lines | length > 0

- name: Warn if IOMMU not detected (may need reboot after GRUB changes)
  ansible.builtin.debug:
    msg: "WARNING: IOMMU not detected in dmesg. If this is a fresh setup, a reboot is required after GRUB configuration."
  when: iommu_dmesg.stdout_lines | length == 0 or 'IOMMU' not in iommu_dmesg.stdout

- name: Verify PCI devices exist
  ansible.builtin.command:
    cmd: "lspci -s {{ item.pci_slot }}"
  register: pci_check
  changed_when: false
  failed_when: pci_check.rc != 0
  loop: "{{ gpu_passthrough_devices }}"
  loop_control:
    label: "{{ item.name | default(item.pci_slot) }}"

- name: Display detected PCI devices
  ansible.builtin.debug:
    msg: "{{ item.stdout }}"
  loop: "{{ pci_check.results }}"
  loop_control:
    label: "{{ item.item.name | default(item.item.pci_slot) }}"
